name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_npm: ${{ steps.detect.outputs.has_npm }}
      has_bun: ${{ steps.detect.outputs.has_bun }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          [[ -f packages/crates/Cargo.toml ]] && echo "has_rust=true" >> "$GITHUB_OUTPUT" || echo "has_rust=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/npm/package.json ]] && echo "has_npm=true" >> "$GITHUB_OUTPUT" || echo "has_npm=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/bun/package.json ]] && echo "has_bun=true" >> "$GITHUB_OUTPUT" || echo "has_bun=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/python/pyproject.toml || -f packages/python/setup.py ]] && echo "has_python=true" >> "$GITHUB_OUTPUT" || echo "has_python=false" >> "$GITHUB_OUTPUT"

  rust-build:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release --manifest-path packages/crates/Cargo.toml
      - name: Run tests
        run: cargo test --all-targets --manifest-path packages/crates/Cargo.toml

  npm-build:
    needs: detect
    if: needs.detect.outputs.has_npm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm test --if-present

  bun-build:
    needs: detect
    if: needs.detect.outputs.has_bun == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bun
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f bun.lock || -f bun.lockb ]]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Build
        run: bun run build --if-present
      - name: Test
        run: bun test

  python-build:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
