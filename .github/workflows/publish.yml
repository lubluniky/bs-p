name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_bun: ${{ steps.detect.outputs.has_bun }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f package.json ]]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f bun.lock || -f bun.lockb || -f bunfig.toml ]]; then
            echo "has_bun=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bun=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f pyproject.toml || -f setup.py ]]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

  publish-crate:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: test -n "${CARGO_REGISTRY_TOKEN:?Set CARGO_REGISTRY_TOKEN in repository secrets}"

      - name: Preflight
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-npm:
    needs: detect
    if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.has_bun != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "${NPM_TOKEN:?Set NPM_TOKEN in repository secrets}"

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Publish to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-bun:
    needs: detect
    if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.has_bun == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Validate npm token for Bun publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "${NPM_TOKEN:?Set NPM_TOKEN in repository secrets}"

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f bun.lock || -f bun.lockb ]]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Publish with Bun to npmjs
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public

  publish-pypi:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
