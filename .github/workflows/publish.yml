name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_npm: ${{ steps.detect.outputs.has_npm }}
      has_bun: ${{ steps.detect.outputs.has_bun }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          [[ -f packages/crates/Cargo.toml ]] && echo "has_rust=true" >> "$GITHUB_OUTPUT" || echo "has_rust=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/npm/package.json ]] && echo "has_npm=true" >> "$GITHUB_OUTPUT" || echo "has_npm=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/bun/package.json ]] && echo "has_bun=true" >> "$GITHUB_OUTPUT" || echo "has_bun=false" >> "$GITHUB_OUTPUT"
          [[ -f packages/python/pyproject.toml || -f packages/python/setup.py ]] && echo "has_python=true" >> "$GITHUB_OUTPUT" || echo "has_python=false" >> "$GITHUB_OUTPUT"

  publish-crate:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: test -n "${CARGO_REGISTRY_TOKEN:?Set CARGO_REGISTRY_TOKEN in repository secrets}"
      - name: Preflight
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run --manifest-path packages/crates/Cargo.toml
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          CRATE_NAME="$(sed -n 's/^name = "\(.*\)"/\1/p' packages/crates/Cargo.toml | head -n 1)"
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/crates/Cargo.toml | head -n 1)"
          if cargo search "${CRATE_NAME}" --limit 1 | grep -Fq "${CRATE_NAME} = \"${CRATE_VERSION}\""; then
            echo "Crate ${CRATE_NAME}@${CRATE_VERSION} already published, skipping."
            exit 0
          fi
          cargo publish --manifest-path packages/crates/Cargo.toml

  publish-npm:
    needs: detect
    if: needs.detect.outputs.has_npm == 'true'
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "${NPM_TOKEN:?Set NPM_TOKEN in repository secrets}"
      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi
      - name: Check npm version
        id: npm_exists
        shell: bash
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm package ${PKG_NAME}@${PKG_VERSION} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npmjs
        if: steps.npm_exists.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-bun:
    needs: detect
    if: needs.detect.outputs.has_bun == 'true'
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/bun
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
      - name: Validate npm token for Bun publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "${NPM_TOKEN:?Set NPM_TOKEN in repository secrets}"
      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f bun.lock || -f bun.lockb ]]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Check Bun package version
        id: bun_exists
        shell: bash
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm package ${PKG_NAME}@${PKG_VERSION} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish with Bun to npmjs
        if: steps.bun_exists.outputs.exists != 'true'
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public

  publish-pypi:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          skip-existing: true
          verbose: true
